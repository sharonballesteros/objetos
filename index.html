<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Alumno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Expediente Académico</h1>

    <div class="card">
        <div class="info-group">
            <span class="label">Nombre Completo:</span>
            <span id="nombre-alumno" class="value">Cargando...</span>
        </div>
        
        <div class="info-group">
            <span class="label">ID Universitario:</span>
            <span id="id-alumno" class="value"></span>
        </div>

        <div class="info-group">
            <span class="label">Ubicación:</span>
            <span id="ubicacion-alumno" class="value"></span>
        </div>

        <div class="info-group">
            <span class="status" id="estado-egresado"></span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
