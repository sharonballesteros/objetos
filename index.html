<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Alumno - Expediente</title>
    <style>
        /* Estilos para que se vea como en tu captura */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        h1 {
            color: #003566;
            text-transform: uppercase;
            border-bottom: 3px solid #ffc300;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            padding: 40px;
        }
        .info-group {
            margin-bottom: 20px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
        }
        .label {
            font-weight: bold;
            font-size: 0.75rem;
            color: #666;
            display: block;
            text-transform: uppercase;
        }
        .value {
            font-size: 1.2rem;
            color: #222;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Expediente Académico</h1>

    <div class="card">
        <div class="info-group">
            <span class="label">Nombre Completo:</span>
            <span id="nombre-alumno" class="value">Cargando...</span>
        </div>
        
        <div class="info-group">
            <span class="label">ID Universitario:</span>
            <span id="id-alumno" class="value"></span>
        </div>

        <div class="info-group">
            <span class="label">Ubicación:</span>
            <span id="ubicacion-alumno" class="value"></span>
        </div>

        <div class="info-group">
            <span class="label">Estatus:</span>
            <span id="estatus-alumno" class="value"></span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
